<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Codex PS</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="panel">
      <div class="topbar">
        <div>
          <strong>Codex PS</strong>
          <span id="connection">Disconnected</span>
        </div>
        <sp-button id="interrupt" size="s">Stop</sp-button>
      </div>

      <div class="mode-switch">
        <sp-button data-mode="safe-auto" class="active" size="s">B 安全自动</sp-button>
        <sp-button data-mode="full-auto" size="s">C 全自动</sp-button>
      </div>

      <div id="log" class="log">
        <div class="event status">面板已打开，正在连接 Codex bridge...</div>
      </div>

      <div class="quick-actions">
        <sp-button id="gallery-open" size="s">图库</sp-button>
        <sp-button id="import-latest" size="s">导入最新图</sp-button>
        <sp-button id="read-canvas" size="s">读取画布</sp-button>
        <sp-button id="read-layers" size="s">读取图层</sp-button>
      </div>

      <div id="composer" class="composer">
        <textarea id="message" rows="3" placeholder="描述你要生成、导入或修改的画面..."></textarea>
        <sp-button id="send" size="s">发送</sp-button>
      </div>
    </div>

    <div id="gallery-modal" class="gallery-modal hidden" aria-hidden="true">
      <div class="gallery-dialog">
        <div class="gallery-header">
          <div>
            <strong>图库</strong>
            <span id="gallery-selected-count">已选择 0 张</span>
          </div>
          <div class="gallery-header-actions">
            <sp-button id="gallery-refresh" size="s">刷新</sp-button>
            <sp-button id="gallery-close" size="s">关闭</sp-button>
          </div>
        </div>

        <div id="gallery-empty" class="gallery-empty hidden">
          <strong>还没有可导入的图片</strong>
          <span>先在面板里生成图片，Codex 生成后的图片会自动出现在这里。</span>
        </div>

        <div id="gallery-grid" class="gallery-grid"></div>

        <div class="gallery-footer">
          <sp-button id="gallery-clear-selection" size="s">取消选择</sp-button>
          <sp-button id="gallery-import-selected" size="s">导入选中</sp-button>
        </div>
      </div>
    </div>
    <script src="./panel.js"></script>
  </body>
</html>
