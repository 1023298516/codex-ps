<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Codex PS</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="panel">
      <div class="topbar">
        <div class="brand">
          <span class="brand-mark">Ps</span>
          <div>
            <strong>Codex PS</strong>
            <span class="connection-line"><span class="status-dot"></span><span id="connection">Disconnected</span></span>
          </div>
        </div>
        <button id="interrupt" class="button button-secondary" type="button">Stop</button>
      </div>

      <div class="mode-switch">
        <button data-mode="safe-auto" class="segmented-button active" type="button">B 安全自动</button>
        <button data-mode="full-auto" class="segmented-button" type="button">C 全自动</button>
      </div>

      <div class="primary-actions">
        <div class="section-label">快捷操作</div>
        <div class="quick-actions">
          <button id="gallery-open" class="action-button action-primary" type="button">
            <span class="action-icon">▦</span>
            <span>图库</span>
          </button>
          <button id="import-latest" class="action-button" type="button">
            <span class="action-icon">↧</span>
            <span>导入最新</span>
          </button>
          <button id="read-canvas" class="action-button" type="button">
            <span class="action-icon">◱</span>
            <span>读画布</span>
          </button>
          <button id="read-layers" class="action-button" type="button">
            <span class="action-icon">≡</span>
            <span>读图层</span>
          </button>
        </div>
      </div>

      <div id="log" class="log">
        <div class="event status">面板已打开，正在连接 Codex bridge...</div>
      </div>

      <div id="composer" class="composer">
        <textarea id="message" rows="3" placeholder="描述要生成、导入或修改的画面..."></textarea>
        <div class="composer-footer">
          <span>⌘ Enter 发送</span>
          <button id="send" class="button button-primary" type="button">发送</button>
        </div>
      </div>
    </div>

    <div id="gallery-modal" class="gallery-modal hidden" aria-hidden="true">
      <div class="gallery-dialog">
        <div class="gallery-header">
          <div>
            <strong>图库</strong>
            <span class="gallery-count-line"><span id="gallery-selected-count">已选择 0 张</span><span id="gallery-total-count"> · 共 0 张</span></span>
          </div>
          <div class="gallery-header-actions">
            <button id="gallery-refresh" class="button button-secondary" type="button">刷新</button>
            <button id="gallery-close" class="button button-secondary" type="button">关闭</button>
          </div>
        </div>

        <div class="gallery-toolbar">
          <span>最近生成</span>
          <span>可多选</span>
          <span>智能对象</span>
        </div>

        <div id="gallery-empty" class="gallery-empty hidden">
          <strong>还没有可导入的图片</strong>
          <span>先在面板里生成图片，Codex 生成后的图片会自动出现在这里。</span>
        </div>

        <div id="gallery-grid" class="gallery-grid"></div>

        <div class="gallery-footer">
          <button id="gallery-clear-selection" class="button button-secondary" type="button">取消选择</button>
          <button id="gallery-import-selected" class="button button-primary" type="button">导入选中</button>
        </div>
      </div>
    </div>

    <div id="preview-modal" class="preview-modal hidden" aria-hidden="true">
      <div class="preview-dialog">
        <div class="preview-header">
          <div>
            <strong id="preview-title">预览图片</strong>
            <span id="preview-meta">确认后导入 Photoshop 画布</span>
          </div>
          <button id="preview-close" class="button button-secondary" type="button">关闭</button>
        </div>
        <div class="preview-frame">
          <img id="preview-image" alt="Codex generated preview">
        </div>
        <div class="preview-note">
          <strong>智能对象</strong>
          <span>保留可编辑图层，适合后续修图。</span>
        </div>
        <div class="preview-footer">
          <button id="preview-cancel" class="button button-secondary" type="button">留在图库</button>
          <button id="preview-import" class="button button-primary" type="button">导入画布</button>
        </div>
      </div>
    </div>
    <script src="./panel.js"></script>
  </body>
</html>
